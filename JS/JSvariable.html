<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Java Script Variable</h1>

    <script>
        //var def- variable is used to store data and variables are containers
        var myName = "ABES";
        document.write(myName);
        console.log(myName);
        // JS execution and scope(global and local)
        function demo(){
            var msg ="Thanks" //local
            console.log(msg);
        }
        demo();
        // variable declaration using let and const
        let msg2="Thanks again";
        console.log(msg2);

        const msg3="Thanks to visit my page";
        console.log(msg3);
    </script>
</body>
</html>
